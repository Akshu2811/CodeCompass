<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCompass — AI Onboarding</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>window.lastGuideMarkdown = "";</script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-color: #161b22;
            --text-color: #c9d1d9;
            --accent-brand: #58a6ff;
            --accent-hover: #3182ce;
            --border-color: #30363d;
            --success-color: #238636;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            box-sizing: border-box;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .header p {
            text-align: center;
            font-size: 1.1rem;
            color: #8b949e;
            margin-bottom: 3rem;
        }

        .card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            border-color: #58a6ff;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 1rem 1.5rem;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-brand);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        button {
            padding: 1rem 2rem;
            background-color: var(--accent-brand);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background-color: var(--success-color);
            width: 100%;
        }

        .btn-success:hover {
            background-color: #2ea043;
        }

        .output-box {
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1rem;
            min-height: 200px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: #1f2937;
            color: #c9d1d9;
        }

        .status-badge {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            background: #1f2937;
            color: #9ca3af;
        }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .disabled-ui {
            opacity: 0.4;
            pointer-events: none;
        }

        .response-content h1,
        .response-content h2,
        .response-content h3 {
            margin: 6px 0 3px 0;
            line-height: 1.3
        }

        .response-content p {
            margin: 3px 0;
            line-height: 1.5
        }

        .response-content ul,
        .response-content ol {
            margin: 2px 0;
            padding-left: 18px
        }

        .response-content ul ul,
        .response-content ol ol {
            margin: 0;
            padding-left: 16px
        }

        .response-content li {
            margin: 1px 0;
            line-height: 1.4
        }

        .response-content table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px
        }

        .response-content td,
        .response-content th {
            padding: 3px 6px;
            border: 1px solid #444
        }

        /* ── Tabs ── */
        .tab-nav {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            background: transparent;
            color: #8b949e;
            border: none;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            margin-bottom: -1px;
        }

        .tab-btn:hover {
            color: var(--text-color);
            background: transparent;
            transform: none;
        }

        .tab-btn:active {
            transform: none;
        }

        .tab-btn.active {
            color: var(--accent-brand);
            border-bottom-color: var(--accent-brand);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* ── Review card ── */
        select {
            padding: 0.8rem 1rem;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-brand);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        textarea.code-input {
            display: block;
            width: 100%;
            padding: 1rem 1.25rem;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-family: 'Courier New', Consolas, monospace;
            font-size: 0.875rem;
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        textarea.code-input:focus {
            outline: none;
            border-color: var(--accent-brand);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        .score-hero {
            text-align: center;
            padding: 2rem;
            margin-bottom: 1.5rem;
            background: #0d1117;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .review-section-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 1.5rem 0 0.75rem;
        }

        .category-row {
            margin-bottom: 1rem;
        }

        .category-label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        .bar-track {
            height: 8px;
            background: #21262d;
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
        }

        .issue-card {
            background: #0d1117;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            border-left: 3px solid;
        }

        .issue-card.critical   { border-left-color: #f87171; }
        .issue-card.warning    { border-left-color: #fbbf24; }
        .issue-card.suggestion { border-left-color: #58a6ff; }

        .severity-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        .severity-badge.critical   { background: rgba(248,113,113,0.15); color: #f87171; }
        .severity-badge.warning    { background: rgba(251,191,36,0.15);  color: #fbbf24; }
        .severity-badge.suggestion { background: rgba(88,166,255,0.15);  color: #58a6ff; }

        .issue-description {
            margin: 0.5rem 0 0.25rem;
            font-size: 0.875rem;
            color: #8b949e;
            line-height: 1.5;
        }

        .issue-fix {
            font-size: 0.875rem;
            color: #58a6ff;
            line-height: 1.5;
        }

        .positive-item {
            font-size: 0.9rem;
            padding: 0.5rem 0;
            color: #8b949e;
            border-bottom: 1px solid #21262d;
            line-height: 1.5;
        }

        .positive-item:last-child {
            border-bottom: none;
        }

        .pr-divider {
            text-align: center;
            color: #8b949e;
            font-size: 0.85rem;
            margin: 1.25rem 0;
            position: relative;
        }

        .pr-divider::before,
        .pr-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: var(--border-color);
        }

        .pr-divider::before { left: 0; }
        .pr-divider::after  { right: 0; }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>CodeCompass</h1>
            <p>Paste a GitHub URL to map out, summarize, and instantly query entire codebases.</p>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" id="tabBtn-ingest" onclick="showTab('ingest')">📥 Ingest Repository</button>
            <button class="tab-btn" id="tabBtn-explore" onclick="showTab('explore')">🔍 Explore &amp; Ask</button>
            <button class="tab-btn" id="tabBtn-review" onclick="showTab('review')">⚡ Review Code</button>
        </div>

        <div class="tab-panel active" id="panel-ingest">
            <div class="card" id="ingestCard">
                <h2 style="margin-top: 0;">1. Ingest Repository</h2>
                <div class="input-group">
                    <input type="text" id="repoUrl" placeholder="e.g. https://github.com/owner/repo" />
                    <button onclick="startIngestion()">Analyze</button>
                </div>
                <div id="statusBadge" class="status-badge" style="display: none;"></div>
            </div>
        </div>

        <div class="tab-panel" id="panel-explore">
            <div class="card disabled-ui" id="chatCard">
                <h2 style="margin-top: 0;">2. Explore &amp; Ask</h2>
                <button class="btn-success" onclick="fetchGuide()" style="margin-bottom: 2rem;">🗺️ Generate Structured
                    Onboarding Guide</button>

                <div class="input-group">
                    <input type="text" id="queryInput" placeholder="Ask details about how files work together..." />
                    <button onclick="askAgent()">Send</button>
                </div>

                <div class="output-box response-content" id="agentOutput">
                    Output from the AI will appear here...
                </div>

                <button id="pdfBtn" class="btn-success" onclick="downloadPdf()" style="display: none; margin-top: 1rem;">Download Onboarding Guide as PDF</button>
            </div>
        </div>

        <div class="tab-panel" id="panel-review">
            <div class="card" id="reviewCard">
                <h2 style="margin-top: 0;">3. Review Code</h2>

                <div class="input-group" style="margin-bottom: 0;">
                    <input type="text" id="prUrl" placeholder="https://github.com/owner/repo/pull/123" />
                    <button id="reviewPrBtn" onclick="runPRReview()">⚡ Review PR</button>
                </div>
                <div class="pr-divider">— or paste code directly —</div>

                <select id="reviewLang">
                    <option value="">Auto-detect</option>
                    <option value="Python">Python</option>
                    <option value="Java">Java</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="TypeScript">TypeScript</option>
                    <option value="Go">Go</option>
                    <option value="Rust">Rust</option>
                    <option value="C++">C++</option>
                    <option value="SQL">SQL</option>
                </select>

                <textarea class="code-input" id="reviewCode" rows="14" placeholder="Paste your code here..."></textarea>

                <button id="reviewBtn" onclick="runCodeReview()" style="width: 100%;">⚡ Review Code</button>

                <div id="reviewLoading" style="display: none; align-items: center; gap: 0.75rem; margin-top: 1.25rem; color: #8b949e;">
                    <div class="spinner"></div>
                    <span>Analyzing code with AI...</span>
                </div>

                <div id="reviewResults" style="display: none; margin-top: 1.5rem;"></div>
            </div>
        </div>
    </div>

    <script>
        let currentActiveRepo = "";
        let pollingTimer;

        function showTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tabBtn-' + name).classList.add('active');
            document.getElementById('panel-' + name).classList.add('active');
        }

        async function startIngestion() {
            const urlInput = document.getElementById("repoUrl").value.trim();
            if (!urlInput) return;

            const badge = document.getElementById("statusBadge");

            const githubPattern = /^https:\/\/github\.com\/[\w.-]+\/[\w.-]+\/?$/;
            if (!githubPattern.test(urlInput)) {
                badge.style.display = "inline-block";
                badge.innerHTML = "Invalid URL. Please enter a valid GitHub repository URL like https://github.com/owner/repo";
                badge.style.color = "#f87171";
                return;
            }

            currentActiveRepo = urlInput;
            badge.style.display = "inline-block";
            badge.innerHTML = `<div class="spinner"></div> Initiating Ingestion...`;
            badge.style.color = "#fbbf24";

            try {
                const res = await fetch("/ingest", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ repo_url: currentActiveRepo })
                });
                const data = await res.json();

                if (data.status === "ingestion_started" || data.status === "in_progress") {
                    pollingTimer = setInterval(pollStatus, 3000);
                } else if (data.status === "completed") {
                    badge.innerHTML = "✅ Ingestion Complete";
                    badge.style.color = "#34d399";
                    unlockChat();
                } else if (res.status === 400) {
                    badge.innerText = data.detail || "Invalid Request";
                    badge.style.color = "#f87171";
                }
            } catch (err) {
                badge.innerText = "Error: Failed to connect to server.";
                badge.style.color = "#f87171";
            }
        }

        async function pollStatus() {
            const res = await fetch(`/status?repo_url=${encodeURIComponent(currentActiveRepo)}`);
            const data = await res.json();
            const badge = document.getElementById("statusBadge");

            if (data.status === "completed") {
                clearInterval(pollingTimer);
                badge.innerHTML = "✅ Ingestion Complete";
                badge.style.color = "#34d399";
                unlockChat();
            } else if (data.status === "failed") {
                clearInterval(pollingTimer);
                badge.innerHTML = "❌ Ingestion Failed";
                badge.style.color = "#f87171";
            } else {
                const pct = data.progress || 0;
                const pctText = pct > 0 ? ` (${pct}%)` : '';
                badge.innerHTML = `<div class="spinner"></div> Ingesting files in background...${pctText}`;
            }
        }

        function unlockChat() {
            const chatCard = document.getElementById("chatCard");
            chatCard.classList.remove("disabled-ui");
        }

        async function askAgent() {
            const query = document.getElementById("queryInput").value;
            const output = document.getElementById("agentOutput");
            const pdfBtn = document.getElementById("pdfBtn");
            if (!query || !currentActiveRepo) return;

            output.innerHTML = `<div class="spinner"></div> Analyzing codebase vectors...`;
            pdfBtn.style.display = "none";

            const res = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ repo_url: currentActiveRepo, question: query })
            });
            const data = await res.json();

            const copyBtnHtml = `<button id="copyBtn" class="copy-btn" onclick="copyAnswer()">📋 Copy</button>`;
            output.innerHTML = copyBtnHtml + marked.parse(data.answer);

            if (data.answer.includes("couldn't find") || data.answer.includes("don't have enough")) {
                output.style.borderLeft = '4px solid #fbbf24';
            } else {
                output.style.borderLeft = 'none';
            }
        }

        async function fetchGuide() {
            const output = document.getElementById("agentOutput");
            const pdfBtn = document.getElementById("pdfBtn");
            if (!currentActiveRepo) return;

            output.innerHTML = `<div class="spinner"></div> Generating curriculum...`;
            pdfBtn.style.display = "none";

            const res = await fetch(`/guide?repo_url=${encodeURIComponent(currentActiveRepo)}`);
            const data = await res.json();
            window.lastGuideMarkdown = data.guide;
            output.innerHTML = marked.parse(data.guide);
            pdfBtn.style.display = "block";
        }

        async function copyAnswer() {
            const output = document.getElementById("agentOutput");
            const clone = output.cloneNode(true);
            const btn = clone.querySelector('.copy-btn');
            if (btn) btn.remove();

            await navigator.clipboard.writeText(clone.innerText.trim());

            const copyBtn = document.getElementById("copyBtn");
            copyBtn.innerHTML = "✅ Copied!";
            setTimeout(() => {
                copyBtn.innerHTML = "📋 Copy";
            }, 2000);
        }

        async function downloadPdf() {
            const pdfBtn = document.getElementById("pdfBtn");
            const originalText = pdfBtn.innerText;
            pdfBtn.innerText = "Generating PDF...";
            pdfBtn.disabled = true;

            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pageWidth = pdf.internal.pageSize.getWidth();
                    const margin = 15;
                    const contentWidth = pageWidth - (margin * 2);
                    let y = margin + 15;

                    const addHeader = () => {
                        if (pdf.internal.getCurrentPageInfo().pageNumber === 1) {
                            pdf.setFont("helvetica", "bold");
                            pdf.setFontSize(16);
                            pdf.setTextColor(26, 115, 232);
                            pdf.text("CodeCompass — Onboarding Guide", margin, margin);
                            pdf.setDrawColor(26, 115, 232);
                            pdf.setLineWidth(0.5);
                            pdf.line(margin, margin + 3, pageWidth - margin, margin + 3);
                        }
                    };

                    const addFooter = () => {
                        const totalPages = pdf.internal.getNumberOfPages();
                        for (let i = 1; i <= totalPages; i++) {
                            pdf.setPage(i);
                            pdf.setFont("helvetica", "normal");
                            pdf.setFontSize(8);
                            pdf.setTextColor(150, 150, 150);
                            const footerStr = `Page ${i} of ${totalPages}`;
                            pdf.text(footerStr, (pageWidth - pdf.getTextWidth(footerStr)) / 2, 287);
                        }
                    };

                    addHeader();

                    const checkPageBreak = (neededSpace) => {
                        if (y + neededSpace > 270) {
                            pdf.addPage();
                            const pNum = pdf.internal.getCurrentPageInfo().pageNumber;
                            addHeader();
                            y = (pNum === 1) ? (margin + 15) : 15;
                            return true;
                        }
                        return false;
                    };

                    let rawText = window.lastGuideMarkdown || "";
                    let lines = rawText.split('\n');

                    const firstContentIndex = lines.findIndex(l => /^(#|\d+\.|Onboarding)/.test(l.trim()));
                    if (firstContentIndex !== -1) {
                        lines = lines.slice(firstContentIndex);
                    }

                    for (let i = 0; i < lines.length; i++) {
                        let line = lines[i];
                        const trimmed = line.trim();

                        if (!trimmed) {
                            y += 4;
                            continue;
                        }

                        if (trimmed.startsWith('|')) {
                            const tableLines = [];
                            while (i < lines.length && lines[i].trim().startsWith('|')) {
                                tableLines.push(lines[i].trim());
                                i++;
                            }
                            i--;

                            if (tableLines.length >= 3) {
                                y += 5;
                                const headers = tableLines[0].split('|').filter(s => s.trim().length > 0).map(s => s.trim());
                                const colWidths = [45, 60, 75];
                                const tableWidth = colWidths.reduce((a, b) => a + b, 0);
                                const tableX = margin;

                                checkPageBreak(12);
                                pdf.setFillColor(26, 115, 232);
                                pdf.rect(tableX, y, tableWidth, 9, 'F');
                                pdf.setFont("helvetica", "bold");
                                pdf.setFontSize(9);
                                pdf.setTextColor(255, 255, 255);
                                pdf.setDrawColor(204, 204, 204);

                                let curX = tableX;
                                headers.forEach((h, idx) => {
                                    pdf.rect(curX, y, colWidths[idx], 9, 'S');
                                    pdf.text(h, curX + 2, y + 6);
                                    curX += colWidths[idx];
                                });
                                y += 9;

                                for (let r = 2; r < tableLines.length; r++) {
                                    const rowData = tableLines[r].split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1).map(s => s.trim());
                                    const isCategory = rowData.length === 1 || (rowData.length === 3 && !rowData[1] && !rowData[2]);

                                    const cellLines = rowData.map((val, idx) => {
                                        const cleanVal = val.replace(/\*\*/g, '').replace(/`/g, '');
                                        return pdf.splitTextToSize(cleanVal, colWidths[idx] - 4);
                                    });

                                    const maxLines = isCategory ? 1 : Math.max(...cellLines.map(l => l.length));
                                    const rowHeight = (maxLines * 4.5) + 3;

                                    checkPageBreak(rowHeight);

                                    if (isCategory) {
                                        pdf.setFillColor(232, 240, 254);
                                        pdf.rect(tableX, y, tableWidth, rowHeight, 'F');
                                        pdf.setDrawColor(204, 204, 204);
                                        pdf.rect(tableX, y, tableWidth, rowHeight, 'S');
                                        pdf.setFont("helvetica", "bold");
                                        pdf.setFontSize(9);
                                        pdf.setTextColor(26, 26, 26);
                                        pdf.text(rowData[0].replace(/\*\*/g, ''), tableX + 2, y + 5.5);
                                    } else {
                                        if (r % 2 === 1) pdf.setFillColor(240, 244, 255);
                                        else pdf.setFillColor(255, 255, 255);
                                        pdf.rect(tableX, y, tableWidth, rowHeight, 'F');
                                        pdf.setFont("helvetica", "normal");
                                        pdf.setFontSize(8);
                                        pdf.setTextColor(33, 33, 33);
                                        let cellX = tableX;
                                        cellLines.forEach((linesArr, idx) => {
                                            pdf.setDrawColor(204, 204, 204);
                                            pdf.rect(cellX, y, colWidths[idx], rowHeight, 'S');
                                            linesArr.forEach((txt, lIdx) => {
                                                pdf.text(txt, cellX + 2, y + 5 + (lIdx * 4.5));
                                            });
                                            cellX += colWidths[idx];
                                        });
                                    }
                                    y += rowHeight;
                                }
                                y += 5;
                                continue;
                            }
                        }

                        let cleanLine = line.replace(/#+\s*/, "").replace(/\*\*/g, "").replace(/`/g, "");

                        let fontSize = 10;
                        let fontStyle = "normal";
                        let textColor = [68, 68, 68];
                        let xOffset = margin;
                        let lineSpacing = 6;
                        let isBullet = false;

                        if (/^\d+\.\s+[A-Z]/.test(trimmed)) {
                            fontSize = 12;
                            fontStyle = "bold";
                            textColor = [26, 26, 26];
                        } else if (/^Step \d+/.test(trimmed)) {
                            fontSize = 11;
                            fontStyle = "bold";
                            textColor = [51, 51, 51];
                        } else if (/^[\*•-]\s+/.test(trimmed)) {
                            xOffset = margin + 8;
                            cleanLine = cleanLine.replace(/^[\*•-]\s+/, "");
                            isBullet = true;
                        }

                        pdf.setFont("helvetica", fontStyle);
                        pdf.setFontSize(fontSize);
                        pdf.setTextColor(textColor[0], textColor[1], textColor[2]);

                        const wrappedLines = pdf.splitTextToSize(cleanLine, contentWidth - (xOffset - margin));
                        for (let j = 0; j < wrappedLines.length; j++) {
                            checkPageBreak(lineSpacing);
                            if (j === 0 && isBullet) {
                                pdf.text("•", margin + 4, y);
                            }
                            pdf.text(wrappedLines[j], xOffset, y);
                            y += lineSpacing;
                        }
                    }

                    addFooter();
                    const repoName = currentActiveRepo
                        .split('/').pop()
                        .replace(/[^a-zA-Z0-9]/g, '_');
                    pdf.save(`${repoName}_Onboarding_Guide.pdf`);
                } catch (err) {
                    console.error(err);
                    alert("PDF Generation Failed: " + err.message);
                } finally {
                    pdfBtn.innerText = originalText;
                    pdfBtn.disabled = false;
                }
            }, 50);
        }

        /* ── Review Code ── */

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function scoreColor(score) {
            if (score >= 70) return '#2ea043';
            if (score >= 40) return '#d97706';
            return '#dc2626';
        }

        function gradeColor(grade) {
            if (grade === 'A' || grade === 'B') return '#2ea043';
            if (grade === 'C') return '#fbbf24';
            return '#f87171';
        }

        function renderReviewResult(data) {
            const sc = data.overall_score != null ? data.overall_score : 0;
            const grade = data.grade || 'F';

            let html = `
                <div class="score-hero">
                    <div>
                        <span style="font-size:4rem;font-weight:700;color:${scoreColor(sc)};line-height:1;">${sc}</span>
                        <span style="font-size:2rem;color:#8b949e;margin:0 0.25rem;">/</span>
                        <span style="font-size:3rem;font-weight:700;color:${gradeColor(grade)};line-height:1;">${esc(grade)}</span>
                    </div>
                    <div style="margin-top:0.75rem;color:#8b949e;font-size:0.95rem;line-height:1.6;">${esc(data.summary || '')}</div>
                    <div style="margin-top:0.4rem;font-size:0.8rem;color:#8b949e;">Language: ${esc(data.language || 'unknown')}</div>
                </div>`;

            if (data.categories) {
                html += `<div class="review-section-title">Category Scores</div>`;
                for (const cat of Object.values(data.categories)) {
                    const s = cat.score != null ? cat.score : 0;
                    const c = scoreColor(s);
                    html += `
                        <div class="category-row">
                            <div class="category-label-row">
                                <span>${esc(cat.label)}</span>
                                <span style="color:${c};font-weight:600;">${s}<span style="color:#8b949e;font-weight:400;">/100</span></span>
                            </div>
                            <div class="bar-track">
                                <div class="bar-fill" style="width:${s}%;background:${c};"></div>
                            </div>
                        </div>`;
                }
            }

            const issues = data.issues || [];
            const groups = [
                { key: 'CRITICAL',   cls: 'critical',   label: '🔴 Critical Issues', color: '#f87171' },
                { key: 'WARNING',    cls: 'warning',    label: '🟡 Warnings',         color: '#fbbf24' },
                { key: 'SUGGESTION', cls: 'suggestion', label: '💡 Suggestions',      color: '#58a6ff' },
            ];
            for (const g of groups) {
                const items = issues.filter(i => i.severity === g.key);
                if (!items.length) continue;
                html += `<div class="review-section-title" style="color:${g.color};">${g.label} (${items.length})</div>`;
                for (const issue of items) {
                    html += `
                        <div class="issue-card ${g.cls}">
                            <div>
                                <span class="severity-badge ${g.cls}">${esc(issue.severity)}</span>
                                <span style="font-weight:600;font-size:0.95rem;">${esc(issue.title || '')}</span>
                            </div>
                            <p class="issue-description">${esc(issue.description || '')}</p>
                            ${issue.fix ? `<div class="issue-fix">💡 ${esc(issue.fix)}</div>` : ''}
                        </div>`;
                }
            }

            const positives = data.positives || [];
            if (positives.length) {
                html += `<div class="review-section-title">✅ Positives</div>
                    <div style="background:#0d1117;border-radius:10px;padding:0.5rem 1.25rem;border:1px solid var(--border-color);">`;
                for (const p of positives) {
                    html += `<div class="positive-item">${esc(p)}</div>`;
                }
                html += `</div>`;
            }

            return html;
        }

        async function runPRReview() {
            const prUrl = document.getElementById('prUrl').value.trim();
            if (!prUrl) {
                return runCodeReview();
            }

            const btn = document.getElementById('reviewPrBtn');
            const reviewBtn = document.getElementById('reviewBtn');
            const loading = document.getElementById('reviewLoading');
            const results = document.getElementById('reviewResults');

            btn.disabled = true;
            reviewBtn.disabled = true;
            loading.style.display = 'flex';
            results.style.display = 'none';

            try {
                const res = await fetch('/review-pr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pr_url: prUrl })
                });
                const data = await res.json();

                if (!res.ok) {
                    results.innerHTML = `<div style="color:#f87171;padding:1rem;background:#0d1117;border-radius:10px;border:1px solid #f87171;">
                        ${esc(data.detail || 'An error occurred.')}
                    </div>`;
                } else {
                    results.innerHTML = renderReviewResult(data);
                }
            } catch (err) {
                results.innerHTML = `<div style="color:#f87171;padding:1rem;background:#0d1117;border-radius:10px;border:1px solid #f87171;">
                    Failed to connect to server: ${esc(err.message)}
                </div>`;
            } finally {
                btn.disabled = false;
                reviewBtn.disabled = false;
                loading.style.display = 'none';
                results.style.display = 'block';
            }
        }

        async function runCodeReview() {
            const code = document.getElementById('reviewCode').value;
            const language = document.getElementById('reviewLang').value;
            const btn = document.getElementById('reviewBtn');
            const loading = document.getElementById('reviewLoading');
            const results = document.getElementById('reviewResults');

            btn.disabled = true;
            loading.style.display = 'flex';
            results.style.display = 'none';

            try {
                const res = await fetch('/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, language })
                });
                const data = await res.json();

                if (!res.ok) {
                    results.innerHTML = `<div style="color:#f87171;padding:1rem;background:#0d1117;border-radius:10px;border:1px solid #f87171;">
                        ${esc(data.detail || 'An error occurred.')}
                    </div>`;
                } else {
                    results.innerHTML = renderReviewResult(data);
                }
            } catch (err) {
                results.innerHTML = `<div style="color:#f87171;padding:1rem;background:#0d1117;border-radius:10px;border:1px solid #f87171;">
                    Failed to connect to server: ${esc(err.message)}
                </div>`;
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
                results.style.display = 'block';
            }
        }

    </script>
